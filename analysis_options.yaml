include: package:very_good_analysis/analysis_options.yaml

# NOTE (deviation from brief): the brief specified `dev:custom_lint` +
# `analyzer: plugins: [custom_lint]`. As of riverpod_lint 3.1.4 (the only
# version compatible with riverpod 3.3.2, the version resolved by
# `flutter_riverpod: ^3.3.2`), riverpod_lint has migrated off the
# `custom_lint` package onto the official `analysis_server_plugin`
# framework and requires analyzer ^12.0.0. The latest custom_lint (0.8.1)
# caps at analyzer ^8.0.0, so custom_lint + riverpod_lint together do not
# resolve. riverpod_lint is registered via the new top-level `plugins:` key
# instead; `custom_lint` was not added as a dependency.
plugins:
  riverpod_lint: 3.1.4

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    public_member_api_docs: false
    lines_longer_than_80_chars: false
